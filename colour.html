<!DOCTYPE html>
<html>
<head>
<style> 
div {
  width: 100px;
  height: 100px;
  background: yellow;
  position: relative;
  animation-name: mymove;
  animation-duration: 5s;
}
@keyframes mymove {
  from {left: 0px;}
  to {left: 200px;}
}
</style>
</head>
<body>
<h1>The animation-name Property</h1>
<div></div>
</body></html>
